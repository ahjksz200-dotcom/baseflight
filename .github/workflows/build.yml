name: Build Baseflight

on: [push, pull_request, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ARM GCC
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi

      - name: Build Firmware
        run: |
          # Kiểm tra xem Makefile nằm ở đâu
          echo "Kiểm tra sự tồn tại của Makefile:"
          ls -F
          
          # Nếu Makefile nằm ở thư mục gốc, lệnh này sẽ chạy
          # Nếu Makefile nằm trong thư mục con, bạn cần thay bằng: cd ten_thu_muc && make
          echo "Bắt đầu biên dịch..."
          make TARGET=NAZE OPTIMIZE=-Os
          
      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: baseflight-firmware
          path: obj/*.hex
          
